# Upptime configuration for status.isaphia.com
# Docs: https://upptime.js.org/docs/configuration
#
# Polls each endpoint every 5 minutes from GitHub-hosted runners, computes 90-day uptime %, and publishes a static status site
# to GitHub Pages. Free. No infra to maintain.

owner: nano6yt3            # GitHub username/org that hosts the status repo
repo: isaphia-status       # Name of the new repo you'll create from upptime/upptime

sites:
  - name: Dashboard (app.isaphia.com)
    url: https://app.isaphia.com/
    expectedStatusCodes: [200, 301, 302, 304]
    maxResponseTime: 5000

  - name: API health
    url: https://app.isaphia.com/api/health
    expectedStatusCodes: [200]
    maxResponseTime: 3000
    # Strong signal: the API also tells us if it lost its DB.
    bodyKeyword: "ok"

# Optional but recommended:
status-website:
  cname: status.isaphia.com    # custom domain for the published status page
  name: Isaphia
  introTitle: "**Isaphia Status** — operational dashboard for app.isaphia.com and related services."
  introMessage: |
    This page is hosted independently of app.isaphia.com prod infrastructure — so it stays online even when our Prod env is not.
    Probes run every 5 minutes from GitHub-hosted runners outside the network.
  navbar:
    - title: Status
      href: /

# Notifier: send a Slack message when a check goes down/up. Wire NOTIFICATION_*
# secrets in the repo settings if you want this. Comment out otherwise.
# notifications:
#   - type: slack
#     channel: "#status"

# Polling cadence + retention.
# 5-min polling = up to 8,640 datapoints per check per month. Free GH Actions
# minutes easily cover this on a public repo. Drop to "10m" if you ever move
# to a private repo and care about the minutes.
delay: 5
liveness: 5
graphs: true
summaryStartDate: "2026-06-07"

# Skip-list for known-degraded endpoints during incident windows.
# i18n / branding tweaks lives here too.
i18n:
  responseTime: Response Time
  uptime: Uptime
  pastIncidents: Past Incidents
  status: Status

assignees:
  - nano6yt3            # who gets a GitHub issue auto-opened when a check goes down
